name: C++ Automated Test Suite

on:
  push: 
    branches: [ "main" ] # Pipeline startet bei jedem Push auf den main-branch

jobs: 
  build-and-test:
    runs-on: ubuntu-latest # Startet eine komplett frische Linux-Machine
    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v4 # kopiert den C++ Code aus dem Repo auf den Runner
        
      - name: Kompliere den Simulator
          # Flags erklaert:
          # -std=c++17 zwingend noetig fuer smart pointer (make_unique)
          # -Wall -Wextra aktiviert alle wichtigen Compiler Warnungen
        run: g++ -std=c++17 -Wall -Wextra *.cpp -o simulator
        
      - name: Fuehre Wahrheitstabellen Tests aus
        # Weiche fuer Betriebssystem-Kompatibilitaet beim Ausfuehren des Binaries
        run: |
          if [ -f "./simulator" ]; then
            ./simulator
          else
            ./simulator.exe
          fi
